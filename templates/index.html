<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Ciberseguridad</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col min-h-screen font-sans antialiased text-[#F8FAFC] bg-cover bg-center bg-fixed" style="background-image: linear-gradient(rgba(26, 18, 48, 0.85), rgba(9, 10, 15, 0.95)), url('{{ url_for('static', filename='fondo.png') }}');">

    <nav class="bg-[#090A0F] text-[#F8FAFC] px-8 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center">
            <img src="{{ url_for('static', filename='logo_empresa.png') }}" alt="Cybershield" class="h-12 w-auto object-contain">
        </div>
        <div class="text-xl font-bold tracking-wide text-[#7C3AED]">
            Saldo: USD <span id="saldo" class="text-[#F8FAFC]">120000</span>
        </div>
    </nav>

    <main class="flex-grow max-w-6xl mx-auto px-6 py-16 text-center">
        <h1 class="text-4xl md:text-5xl font-bold text-[#F8FAFC] mb-16 tracking-tight">
            Catálogo de productos
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-stretch" id="contenedorProductos">
        </div>
    </main>

    <div id="modalCompra" class="fixed inset-0 bg-black/80 flex justify-center items-center hidden z-50">
        <div class="bg-[#090A0F] rounded-3xl p-8 w-full max-w-[420px] shadow-2xl text-center border border-[#2F1B63]">
            
            <div id="modalImagen" class="w-full h-40 bg-[#1A1230] rounded-xl mb-6 flex items-center justify-center text-gray-400 text-sm border border-[#2F1B63]">
                </div>
            
            <input type="number" id="inputCantidad" placeholder="Cantidad" min="1" value="1"
                class="bg-[#1A1230] text-[#F8FAFC] font-bold text-center placeholder-gray-500 rounded-xl px-4 py-3.5 outline-none w-full mb-4 shadow-inner border border-[#2F1B63] focus:border-[#7C3AED]">
            
            <button onclick="confirmarCompra()" 
                class="bg-[#7C3AED] text-[#F8FAFC] font-bold py-3.5 rounded-2xl tracking-wide hover:bg-[#5b21b6] transition-colors w-full text-sm">
                CONFIRMAR COMPRA
            </button>
            <button onclick="cerrarModales()" class="text-gray-400 hover:text-[#7C3AED] mt-5 text-xs font-semibold w-full transition-colors">
                CANCELAR
            </button>
        </div>
    </div>

    <div id="modalExito" class="fixed inset-0 bg-black/80 flex justify-center items-center hidden z-50">
        <div class="bg-[#090A0F] rounded-3xl p-8 w-full max-w-[420px] shadow-2xl text-center border border-[#2F1B63]">
            <svg class="w-20 h-20 text-[#7C3AED] mx-auto mb-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="text-[#F8FAFC] text-xl font-bold mb-2">¡Gracias por su compra!</p>
            <button onclick="cerrarModales()" class="bg-[#7C3AED] text-[#F8FAFC] font-bold py-3 mt-6 rounded-2xl tracking-wide hover:bg-[#5b21b6] transition-colors w-full text-sm">
                CERRAR
            </button>
        </div>
    </div>

    <script>
        let saldoDisponible = 120000;
        let precioProductoActual = 0;

        const productos = [
            { id: 1, titulo: "Broche Elegante", desc: "Stock disponible", precio: 5000, imagen: "producto1.png" },
            { id: 2, titulo: "Lampara de Mariposa", desc: "Stock disponible", precio: 3000, imagen: "producto2.png" },
            { id: 3, titulo: "Alejandrita", desc: "Stock disponible", precio: 1500, imagen: "producto3.png" },
            { id: 4, titulo: "Barra de Oro", desc: "Stock disponible", precio: 2000, imagen: "producto4.png" },
            { id: 5, titulo: "Colgante Rojo", desc: "Stock disponible", precio: 4000, imagen: "producto5.png" },
            { id: 6, titulo: "Diamante Amarillo", desc: "Stock disponible", precio: 2500, imagen: "producto6.png" },
            { id: 7, titulo: "Corazón de África", desc: "Stock disponible", precio: 3500, imagen: "producto7.png" },
            { id: 8, titulo: "Rubí", desc: "Stock disponible", precio: 1000, imagen: "producto8.png" },
            { id: 9, titulo: "Promoción de AED", desc: "Sin Stock", precio: 1000000, imagen: "producto9.png" }
        ];

        const contenedor = document.getElementById('contenedorProductos');
        
        productos.forEach(prod => {
            contenedor.innerHTML += `
                <div class="bg-[#2F1B63] rounded-3xl p-8 flex flex-col justify-between items-center shadow-lg border border-[#090A0F]">
                    <div class="flex flex-col items-center w-full">
                        <div class="w-full h-32 bg-[#1A1230] rounded-xl mb-6 flex items-center justify-center border border-[#090A0F] p-2">
                            <img src="/static/${prod.imagen}" alt="${prod.titulo}" class="w-full h-full object-contain rounded-lg">
                        </div>
                        <h2 class="text-xl font-bold tracking-wider text-[#F8FAFC] mb-2">${prod.titulo}</h2>
                        <p class="text-sm font-medium text-gray-300 leading-relaxed mb-4 px-2">${prod.desc}</p>
                        <p class="text-lg font-bold text-[#7C3AED] mb-6">Precio: <span class="text-[#F8FAFC]">USD ${prod.precio}</span></p>
                    </div>
                    <button onclick="abrirModalCompra(${prod.precio}, '${prod.imagen}')" class="w-full bg-[#7C3AED] text-[#F8FAFC] font-bold py-3.5 rounded-xl tracking-widest text-xs uppercase hover:bg-[#5b21b6] transition-colors shadow-sm">
                        COMPRAR
                    </button>
                </div>
            `;
        });

        function actualizarSaldoUI() {
            document.getElementById('saldo').innerText = saldoDisponible.toLocaleString('es-AR');
        }

        // SE ACTUALIZÓ ESTA FUNCIÓN PARA MOSTRAR LA IMAGEN
        function abrirModalCompra(precio, imagen) {
            precioProductoActual = precio;
            document.getElementById('inputCantidad').value = 1;
            document.getElementById('modalImagen').innerHTML = '<img src="/static/' + imagen + '" class="w-full h-full object-contain rounded-xl p-2">';
            document.getElementById('modalCompra').classList.remove('hidden');
        }

        function confirmarCompra() {
            const cantidad = parseInt(document.getElementById('inputCantidad').value);
            if (isNaN(cantidad) || cantidad <= 0) return;

            const total = precioProductoActual * cantidad;

            if (total > saldoDisponible) {
                alert("Saldo insuficiente para realizar esta compra.");
                return;
            }

            saldoDisponible -= total;
            actualizarSaldoUI();

            document.getElementById('modalCompra').classList.add('hidden');
            document.getElementById('modalExito').classList.remove('hidden');
        }

        function cerrarModales() {
            document.getElementById('modalCompra').classList.add('hidden');
            document.getElementById('modalExito').classList.add('hidden');
            precioProductoActual = 0;
            // Limpia la imagen al cerrar
            document.getElementById('modalImagen').innerHTML = '';
        }

        actualizarSaldoUI();
    </script>
</body>
</html>
